name: CI → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Static quality gates ──────────────────────────────────────────────
  quality:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:all

  # ── 2. Deploy preview (single build, shared by E2E + promote) ────────────
  preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel preview
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(npx vercel --yes \
            --token "${{ secrets.VERCEL_TOKEN }}" 2>&1)
          echo "$DEPLOY_OUTPUT"
          URL=$(echo "$DEPLOY_OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 3. E2E against the real Vercel preview (advisory — does not block promote) ──
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: preview
    continue-on-error: true   # report results but never block production deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E against Vercel preview
        run: npm run test:e2e
        env:
          CI: true
          BASE_URL: ${{ needs.preview.outputs.url }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 4. Promote to production (main push only, after quality + preview) ────
  #
  # We alias the SAME preview artifact that was tested — no second build.
  # E2E is advisory (continue-on-error) so it never blocks this step.
  promote:
    name: Promote to production
    runs-on: ubuntu-latest
    needs: [quality, preview]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Alias preview to production domain
        run: |
          PREVIEW_URL="${{ needs.preview.outputs.url }}"
          echo "Promoting $PREVIEW_URL → pokedex-henna-nu-98.vercel.app"
          npx vercel alias set "$PREVIEW_URL" pokedex-henna-nu-98.vercel.app \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
